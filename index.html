<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="思考メモ" />
  <link rel="manifest" href="manifest.json" />
  <title>思考メモ</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #0F172A;
      --steel: #475569;
      --blue: #2563EB;
      --lblue: #EFF6FF;
      --white: #FFFFFF;
      --gray: #F8F9FA;
      --border: #E2E8F0;
      --danger: #EF4444;
      --success: #16A34A;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--gray);
      color: var(--navy);
      font-size: 16px;
      line-height: 1.6;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--white);
    }

    header {
      background: var(--navy);
      color: var(--white);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .date-label {
      font-size: 12px;
      color: #94A3B8;
    }

    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    .screen.active {
      display: flex;
    }

    /* ===== 入力スクリーン ===== */
    .input-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .hint {
      font-size: 13px;
      color: var(--steel);
      background: var(--lblue);
      border-left: 3px solid var(--blue);
      padding: 10px 12px;
      border-radius: 0 6px 6px 0;
      line-height: 1.5;
    }

    textarea {
      flex: 1;
      min-height: 200px;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.7;
      color: var(--navy);
      resize: none;
      outline: none;
      background: var(--white);
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--blue);
    }

    textarea::placeholder {
      color: #CBD5E1;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #94A3B8;
      margin-top: -4px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }

    .btn-secondary {
      background: var(--gray);
      color: var(--steel);
      border: 1.5px solid var(--border);
    }

    .btn-save {
      background: var(--success);
      color: var(--white);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== チャットスクリーン ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--blue);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--gray);
      color: var(--navy);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg.ai .angles {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .msg.ai .angles-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .angle-tag {
      display: inline-block;
      background: var(--lblue);
      color: var(--blue);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin: 2px 3px 2px 0;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--white);
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      line-height: 1.5;
      background: var(--gray);
    }

    .chat-input:focus {
      border-color: var(--blue);
      background: var(--white);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: var(--white);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:disabled {
      opacity: 0.4;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
    }

    /* ===== 設定スクリーン ===== */
    #settings-screen {
      padding: 20px 16px;
      gap: 18px;
      overflow-y: auto;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
    }

    .setting-desc {
      font-size: 12px;
      color: var(--steel);
      line-height: 1.5;
    }

    input[type="text"] {
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--navy);
      outline: none;
      width: 100%;
    }

    input:focus {
      border-color: var(--blue);
    }

    .setting-note {
      background: var(--lblue);
      border: 1px solid #BFDBFE;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--steel);
      line-height: 1.6;
    }

    .setting-note strong {
      color: var(--navy);
    }

    .setting-separator {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* ===== ナビ ===== */
    nav {
      display: flex;
      background: var(--white);
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
    }

    .nav-btn {
      flex: 1;
      padding: 10px 4px 12px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: #94A3B8;
      transition: color 0.2s;
    }

    .nav-btn span {
      font-size: 10px;
      font-weight: 600;
    }

    .nav-btn.active {
      color: var(--blue);
    }

    /* ===== ローディング ===== */
    .loading-dots {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .loading-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--steel);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div>
        <h1>💭 思考メモ</h1>
        <div class="date-label" id="header-date"></div>
      </div>
      <div style="font-size:12px; color:#64748B;" id="save-status"></div>
    </header>

    <!-- ===== 入力スクリーン ===== -->
    <div class="screen active" id="input-screen">
      <div class="input-area">
        <div class="hint">今日気になったこと、仕事での気づき、違和感、やらかしたことなど、なんでも。</div>
        <textarea id="main-input" placeholder="例）今日の会議で、DXと言いながら全員Excelで管理していることに気づいた。誰も指摘しないのが不思議で..."
          rows="8"></textarea>
        <div class="char-count"><span id="char-count">0</span> 文字</div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btn-save-only">そのまま保存</button>
          <button class="btn btn-primary" id="btn-ai-chat">AIに相談 →</button>
        </div>
      </div>
    </div>

    <!-- ===== チャットスクリーン ===== -->
    <div class="screen" id="chat-screen">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="返答や補足を入力..." rows="1"></textarea>
          <button class="send-btn" id="btn-send">↑</button>
        </div>
        <div class="chat-actions">
          <button class="btn btn-secondary" id="btn-back-input" style="font-size:13px; padding:10px;">← 書き直す</button>
          <button class="btn btn-save" id="btn-save-from-chat" style="font-size:13px; padding:10px;">保存する ✓</button>
        </div>
      </div>
    </div>

    <!-- ===== 設定スクリーン ===== -->
    <div class="screen" id="settings-screen">
      <div class="setting-group">
        <div class="setting-label">Google Apps Script URL</div>
        <div class="setting-desc">GAS をデプロイしたときに発行される「ウェブアプリの URL」を貼り付けてください。</div>
        <input type="text" id="gas-url"
          placeholder="https://script.google.com/macros/s/AKfycbxhSWLojoXRU5Pe2nbpBt2xZDJsqyJCu9RkdGi-45ib6_KJa8jZKcQCX9RfsA7gTG_tog/exec" />
      </div>

      <div class="setting-note">
        <strong>🔑 Gemini APIキーの設定場所が変わりました</strong><br>
        APIキーはこの画面ではなく、Google Apps Script の「スクリプトのプロパティ」に設定します。<br>
        → GASエディタ ⚙️ プロジェクトの設定 → スクリプトのプロパティ → キー名: <code>GEMINI_API_KEY</code>
      </div>

      <hr class="setting-separator" />
      <button class="btn btn-primary" id="btn-save-settings">設定を保存</button>
      <div style="font-size:12px; color:var(--steel); margin-top:4px;">
        設定はこのブラウザにのみ保存されます。別のデバイスでは再入力が必要です。
      </div>
    </div>

    <nav>
      <button class="nav-btn active" data-target="input-screen">✏️<span>メモ</span></button>
      <button class="nav-btn" data-target="settings-screen">⚙️<span>設定</span></button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    //  状態管理
    // ============================================================
    const state = {
      gasUrl: localStorage.getItem('gas_url') || '',
      chatHistory: [],
      currentEntry: null
    };

    // ============================================================
    //  初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('header-date').textContent =
        new Date().toLocaleDateString('ja-JP', {
          year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
        });
      document.getElementById('gas-url').value = state.gasUrl;
      bindEvents();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      }
    });

    // ============================================================
    //  イベント
    // ============================================================
    function bindEvents() {
      const mainInput = document.getElementById('main-input');
      mainInput.addEventListener('input', () => {
        document.getElementById('char-count').textContent = mainInput.value.length;
      });

      document.getElementById('btn-save-only').addEventListener('click', async () => {
        const text = mainInput.value.trim();
        if (!text) { showToast('テキストを入力してください', 'error'); return; }
        await saveEntry(text, [], null);
        mainInput.value = '';
        document.getElementById('char-count').textContent = '0';
      });

      document.getElementById('btn-ai-chat').addEventListener('click', async () => {
        const text = mainInput.value.trim();
        if (!text) { showToast('テキストを入力してください', 'error'); return; }
        if (!state.gasUrl) { showToast('設定からGAS URLを入力してください', 'error'); return; }
        switchScreen('chat-screen');
        state.chatHistory = [];
        renderUserMsg(text);
        await askAI(text);
      });

      document.getElementById('btn-send').addEventListener('click', sendChatMessage);
      document.getElementById('chat-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
      });

      document.getElementById('btn-back-input').addEventListener('click', () => {
        switchScreen('input-screen');
        state.chatHistory = [];
        clearChat();
      });

      document.getElementById('btn-save-from-chat').addEventListener('click', async () => {
        if (!state.currentEntry) { showToast('まだAIと会話していません', 'error'); return; }
        await saveEntryObj(state.currentEntry);
        switchScreen('input-screen');
        document.getElementById('main-input').value = '';
        document.getElementById('char-count').textContent = '0';
        state.chatHistory = [];
        clearChat();
      });

      document.getElementById('btn-save-settings').addEventListener('click', () => {
        state.gasUrl = document.getElementById('gas-url').value.trim();
        localStorage.setItem('gas_url', state.gasUrl);
        showToast('設定を保存しました ✓', 'success');
      });

      document.querySelectorAll('.nav-btn[data-target]').forEach(btn => {
        btn.addEventListener('click', () => switchScreen(btn.dataset.target));
      });
    }

    // ============================================================
    //  チャット
    // ============================================================
    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      renderUserMsg(text);
      await askAI(text);
    }

    async function askAI(userText) {
      const sendBtn = document.getElementById('btn-send');
      sendBtn.disabled = true;
      const loadingEl = renderLoading();

      // 会話履歴に追加
      state.chatHistory.push({ role: 'user', parts: [{ text: userText }] });

      try {
        // GAS経由でGeminiを呼ぶ（JSONボディで送信）
        const res = await fetch(state.gasUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'chat',
            history: state.chatHistory
          })
        });

        if (!res.ok) throw new Error('通信エラー: ' + res.status);

        const json = await res.json();
        if (!json.success) throw new Error(json.error || '不明なエラー');

        const aiText = json.text;
        state.chatHistory.push({ role: 'model', parts: [{ text: aiText }] });

        const { question, angles } = parseAiResponse(aiText);
        loadingEl.remove();
        renderAiMsg(question, angles);

        // 保存用エントリを更新
        const mainText = document.getElementById('main-input').value.trim() || userText;
        state.currentEntry = buildEntry(mainText, angles, aiText);

      } catch (err) {
        loadingEl.remove();
        renderAiMsg('⚠️ ' + err.message, []);
      }

      sendBtn.disabled = false;
    }

    function parseAiResponse(text) {
      const questionMatch = text.match(/\[掘り下げ質問\]\n?([\s\S]*?)(?:\n\[X投稿の切り口\]|$)/);
      const anglesBlock = text.match(/\[X投稿の切り口\]\n?([\s\S]*?)$/);

      const question = questionMatch ? questionMatch[1].trim() : text;
      const angles = [];

      if (anglesBlock) {
        anglesBlock[1].split('\n').forEach(line => {
          const m = line.match(/[・\-]\s*(.+?)：/);
          if (m) angles.push(m[1].trim());
        });
      }
      return { question, angles };
    }

    // ============================================================
    //  メッセージレンダリング
    // ============================================================
    function renderUserMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg user';
      el.textContent = text;
      getMessages().appendChild(el);
      scrollBottom();
    }

    function renderAiMsg(question, angles) {
      const el = document.createElement('div');
      el.className = 'msg ai';
      const qEl = document.createElement('div');
      qEl.textContent = question;
      el.appendChild(qEl);

      if (angles && angles.length > 0) {
        const anglesEl = document.createElement('div');
        anglesEl.className = 'angles';
        const title = document.createElement('div');
        title.className = 'angles-title';
        title.textContent = '✦ X投稿の切り口';
        anglesEl.appendChild(title);
        angles.forEach(a => {
          const tag = document.createElement('span');
          tag.className = 'angle-tag';
          tag.textContent = a;
          anglesEl.appendChild(tag);
        });
        el.appendChild(anglesEl);
      }
      getMessages().appendChild(el);
      scrollBottom();
    }

    function renderLoading() {
      const el = document.createElement('div');
      el.className = 'msg ai';
      el.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
      getMessages().appendChild(el);
      scrollBottom();
      return el;
    }

    function clearChat() { getMessages().innerHTML = ''; state.currentEntry = null; }
    function getMessages() { return document.getElementById('chat-messages'); }
    function scrollBottom() { const m = getMessages(); m.scrollTop = m.scrollHeight; }

    // ============================================================
    //  保存処理
    // ============================================================
    function buildEntry(content, angles, aiResponse) {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const id = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      return { id, timestamp: now.toISOString(), content, x_angles: angles, ai_response: aiResponse || null, mood: '' };
    }

    async function saveEntry(content, angles, aiResponse) {
      return saveEntryObj(buildEntry(content, angles, aiResponse));
    }

    async function saveEntryObj(entry) {
      if (!state.gasUrl) { showToast('設定からGAS URLを入力してください', 'error'); return; }

      document.getElementById('save-status').textContent = '保存中...';

      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const date = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;

      try {
        // JSONボディで送信（no-corsを使わないことで実際のエラーを検出できる）
        const res = await fetch(state.gasUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'save', date, entry })
        });

        if (!res.ok) throw new Error('通信エラー: ' + res.status);

        const json = await res.json();
        if (!json.success) throw new Error(json.error || '不明なエラー');

        document.getElementById('save-status').textContent = '';
        showToast('保存しました ✓', 'success');
      } catch (err) {
        document.getElementById('save-status').textContent = '';
        showToast('保存エラー：' + err.message, 'error');
      }
    }

    // ============================================================
    //  UI ユーティリティ
    // ============================================================
    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.target === id);
      });
    }

    let toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
    }
  </script>
</body>

</html>
